name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    name: check (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        # Explicit LTS + arch pins, not ubuntu-latest — a moving target that
        # silently changes underlying OS version. ubuntu-26.04 is GitHub's
        # public-preview image as of 2026-05; some software there can still
        # be unstable, so fail-fast stays false to avoid masking real
        # failures on the other runners if it flakes.
        os:
          [
            ubuntu-24.04,
            ubuntu-24.04-arm,
            ubuntu-26.04,
            ubuntu-26.04-arm,
            macos-latest,
          ]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      # winit + wgpu need windowing/GL dev headers to build on Linux.
      - name: Install Linux deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libwayland-dev libxkbcommon-dev libx11-dev libxrandr-dev \
            libxi-dev libgl1-mesa-dev libegl1-mesa-dev
      - name: Format
        run: cargo fmt --all -- --check
      - name: Clippy
        run: cargo clippy --all-targets --all-features -- -D warnings
      - name: Test
        run: cargo test --all --all-features
      - name: Bench (compile gate)
        run: cargo bench --all --no-run

  licenses:
    name: license gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # Fails the build if any dependency's license falls outside the permissive
      # allow-list in deny.toml — i.e. if anything copyleft/infectious (GPL/AGPL/…)
      # ever sneaks in via a dependency bump. Policy lives in deny.toml.
      - uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check licenses
