name: CI

on:
  push:
    branches: [main]
  pull_request:

# Least privilege: every job here only reads the repo (checkout, build, test,
# license scan). Without this, each job's GITHUB_TOKEN gets the repo default,
# which can include write scopes a compromised action or dependency could abuse.
permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    name: check (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        # Explicit LTS + arch pins, not ubuntu-latest — a moving target that
        # silently changes underlying OS version. ubuntu-22.04 is the oldest
        # supported LTS (glibc 2.35): release bottles are built against its
        # glibc so they run on every newer release, and this pin keeps the
        # build honest on that floor. ubuntu-26.04 is GitHub's public-preview
        # image as of 2026-05; some software there can still be unstable, so
        # fail-fast stays false to avoid masking real failures on the other
        # runners if it flakes.
        os:
          [
            ubuntu-22.04,
            ubuntu-22.04-arm,
            ubuntu-24.04,
            ubuntu-24.04-arm,
            ubuntu-26.04,
            ubuntu-26.04-arm,
            macos-latest,
          ]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      # winit + wgpu need windowing/GL dev headers to build on Linux.
      - name: Install Linux deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libwayland-dev libxkbcommon-dev libx11-dev libxrandr-dev \
            libxi-dev libgl1-mesa-dev libegl1-mesa-dev
      - name: Format
        run: cargo fmt --all -- --check
      - name: Clippy
        run: cargo clippy --all-targets --all-features -- -D warnings
      - name: Test
        run: cargo test --all --all-features
      - name: Bench (compile gate)
        run: cargo bench --all --no-run

  # Real-window smoke: the `check` job runs `cargo test`, which NEVER creates a
  # window or GPU surface, so a winit/wgpu/X11 regression (or a missing runtime
  # dep) sails through it. This job launches the actual binary under Xvfb with
  # software Vulkan (lavapipe) and drives it via the control socket — the same
  # path release bottles are smoke-tested on. Assertions live in
  # scripts/smoke/window-smoke.sh (shared with the standalone container harness).
  smoke:
    name: real-window smoke (X11)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      # Build headers PLUS the RUNTIME libs a real window needs but `check`
      # never installs — libxcursor1 + libxkbcommon-x11-0 (winit dlopens them;
      # startup panics without) and a system monospace font — plus Xvfb and
      # mesa's software Vulkan ICD.
      - name: Install deps (build + runtime + Xvfb + software Vulkan)
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libwayland-dev libxkbcommon-dev libx11-dev libxcursor-dev libxi-dev \
            libxrandr-dev libxcb1-dev libvulkan-dev mesa-vulkan-drivers \
            libfontconfig1-dev fonts-dejavu-core \
            xvfb x11-apps imagemagick libxi6 libxcursor1 libxkbcommon-x11-0
      - name: Build ember-term (release)
        run: cargo build --release -p ember-app --bin ember-term
      - name: Smoke under Xvfb + lavapipe
        run: |
          Xvfb :99 -screen 0 1280x800x24 >/dev/null 2>&1 &
          sleep 2
          export DISPLAY=:99
          export VK_ICD_FILENAMES="$(ls /usr/share/vulkan/icd.d/lvp_icd*.json | head -1)"
          export WGPU_BACKEND=vulkan WINIT_UNIX_BACKEND=x11
          export EMBER_SMOKE_BIN="$PWD/target/release/ember-term"
          export EMBER_SMOKE_OUT="$PWD/smoke-artifacts"
          bash scripts/smoke/window-smoke.sh
      - name: Upload smoke screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: window-smoke-x11
          path: smoke-artifacts/*.png
          if-no-files-found: ignore

  licenses:
    name: license gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # Fails the build if any dependency's license falls outside the permissive
      # allow-list in deny.toml — i.e. if anything copyleft/infectious (GPL/AGPL/…)
      # ever sneaks in via a dependency bump. Policy lives in deny.toml.
      - uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check licenses
